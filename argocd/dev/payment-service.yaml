apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-dev
  namespace: openshift-gitops
  labels:
    app: payment-service
    environment: dev
spec:
  project: default
  sources:
    # ── Source 1: Helm chart (gitops-demos) ──────────────────
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      path: charts/payment-service
      helm:
        releaseName: payment-service
        valueFiles:
          # Ops team: replicas, image tag, resources
          - $gitops-config/deploy-config/dev/payment-service/values.yaml
          # Dev team: springConfig block → rendered to application.properties
          - $app-config/app-config/dev/payment-service/values.yaml

    # ── Source 2: ref for $gitops-config ─────────────────────
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      ref: gitops-config

    # ── Source 3: ref for $app-config ────────────────────────
    - repoURL: https://github.com/gehlotvishnu/spring-boot-config.git
      targetRevision: main
      ref: app-config

  destination:
    server: https://kubernetes.default.svc
    namespace: payment-service-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
