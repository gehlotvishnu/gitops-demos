apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-demo-prod
  namespace: openshift-gitops
  labels:
    environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/gitops-demo.git
    targetRevision: main
    path: charts/spring-boot-app
    helm:
      valueFiles:
        - ../../envs/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: spring-boot-prod
  syncPolicy:
    # Prod: manual sync only — no automated prune, requires human approval
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
