apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service-sit
  namespace: openshift-gitops
  labels:
    app: order-service
    environment: sit
spec:
  project: default
  sources:
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      path: charts/order-service
      helm:
        releaseName: order-service
        valueFiles:
          - $gitops-config/deploy-config/sit/order-service/values.yaml
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      ref: gitops-config
    - repoURL: https://github.com/gehlotvishnu/spring-boot-config.git
      targetRevision: main
      path: app-config/sit/order-service
  destination:
    server: https://kubernetes.default.svc
    namespace: order-service-sit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
