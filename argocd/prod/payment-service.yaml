apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-prod
  namespace: openshift-gitops
  labels:
    app: payment-service
    environment: prod
spec:
  project: default
  sources:
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      path: charts/payment-service
      helm:
        releaseName: payment-service
        valueFiles:
          - $gitops-config/deploy-config/prod/payment-service/values.yaml
    - repoURL: https://github.com/gehlotvishnu/gitops-demos.git
      targetRevision: main
      ref: gitops-config
    - repoURL: https://github.com/gehlotvishnu/spring-boot-config.git
      targetRevision: main
      path: app-config/prod/payment-service
  destination:
    server: https://kubernetes.default.svc
    namespace: payment-service-prod
  syncPolicy:
    # Prod: manual sync only — requires deliberate approval in ArgoCD UI or CLI
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
