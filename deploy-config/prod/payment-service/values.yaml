# ── DEPLOY CONFIG  (Ops team) ── payment-service / prod ─────
replicaCount: 2

image:
  repository: ghcr.io/gehlotvishnu/payment-service
  tag: "1.0.5"            # Prod: stable promoted tag only

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
