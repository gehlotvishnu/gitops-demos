# ── DEPLOY CONFIG  (Ops team) ── order-service / prod ───────
replicaCount: 2

image:
  repository: ghcr.io/gehlotvishnu/order-service
  tag: "1.0.3"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
