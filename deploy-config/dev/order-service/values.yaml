# ── DEPLOY CONFIG  (Ops team) ── order-service / dev ────────
replicaCount: 1

image:
  repository: docker.io/springio/gs-spring-boot-docker
  tag: "latest"

resources:
  requests:
    cpu: 10m
    memory: 1Mi
  limits:
    cpu: 300m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

autoscaling:
  enabled: false
