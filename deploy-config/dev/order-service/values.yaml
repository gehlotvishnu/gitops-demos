# ── DEPLOY CONFIG  (Ops team) ── order-service / dev ────────
replicaCount: 1

image:
  repository: docker.io/springio/gs-spring-boot-docker
  tag: "latest"

resources:
  requests:
    cpu: 10m
    memory: 1Mi    # CRC: request=1Mi to schedule; limit=512Mi gives JVM room; -Xmx200m caps heap
  limits:
    cpu: 300m
    memory: 512Mi

javaOpts: "-Xmx200m -Xms128m"

livenessProbe:
  httpGet:
    path: /orders
    port: 8080
  initialDelaySeconds: 45
  periodSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /orders
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 5

autoscaling:
  enabled: false
