# ── DEPLOY CONFIG  (Ops team) ── payment-service / dev ──────
replicaCount: 1

image:
  repository: docker.io/springio/gs-spring-boot-docker
  tag: "latest"           # CI updates: yq -i '.image.tag="1.2.3-abc"' this file

resources:
  requests:
    cpu: 10m
    memory: 1Mi           # Minimal for CRC
  limits:
    cpu: 300m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

autoscaling:
  enabled: false
