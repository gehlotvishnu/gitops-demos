# ── DEPLOY CONFIG  (Ops team) ── payment-service / sit ──────
replicaCount: 1

image:
  repository: ghcr.io/gehlotvishnu/payment-service
  tag: "1.1.0-sit"        # SIT always uses a fixed tag (never latest)

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
