# Prod environment — higher resources, autoscaling enabled
replicaCount: 2

image:
  repository: ghcr.io/gehlotvishnu/spring-boot-demo
  tag: "1.0.0"         # Prod only gets promoted stable tags (never "latest")

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

appConfig:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics"
  LOG_LEVEL: "INFO"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
