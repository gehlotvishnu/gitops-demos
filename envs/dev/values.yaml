# Dev environment — low resources, single replica
replicaCount: 1

image:
  repository: docker.io/springio/gs-spring-boot-docker
  tag: "latest"        # Replace with ghcr.io/gehlotvishnu/spring-boot-demo once app repo is set up

resources:
  requests:
    cpu: 10m
    memory: 1Mi    # Minimal request so it schedules on memory-constrained CRC
  limits:
    cpu: 500m
    memory: 256Mi

appConfig:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
  LOG_LEVEL: "DEBUG"

autoscaling:
  enabled: false

# Override probes for demo image (no actuator)
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
