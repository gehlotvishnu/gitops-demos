# Dev environment — low resources, single replica
replicaCount: 1

image:
  repository: ghcr.io/YOUR_ORG/spring-boot-demo
  tag: "latest"        # CI updates this: yq -i '.image.tag = "1.2.3-abc1234"' envs/dev/values.yaml

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

appConfig:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
  LOG_LEVEL: "DEBUG"

autoscaling:
  enabled: false
