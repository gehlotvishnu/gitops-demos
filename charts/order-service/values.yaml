# =============================================================
# order-service chart defaults  —  do not edit directly
# Override in: envs/<env>/order-service/deploy-values.yaml
# App config in: spring-boot-config/<env>/order-service/app-config.yaml
# =============================================================

replicaCount: 1

image:
  repository: ghcr.io/gehlotvishnu/order-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

route:
  enabled: true
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# NOTE: application.properties is NOT managed by this chart.
# It is a separate ConfigMap (<release-name>-app-config) managed by the
# spring-boot-config repo, applied as a second ArgoCD source.
