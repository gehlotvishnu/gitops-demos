apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-app-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    config.owner: app-team
data:
  # Rendered from: spring-boot-config/app-config/<env>/<service>/values.yaml → springConfig
  # Dev team edits that file in standard application.properties format.
  # Spring Boot auto-loads /config/application.properties (external config location).
  application.properties: |
{{ .Values.springConfig | indent 4 }}
